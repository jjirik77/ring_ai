<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Lifecycle Challenge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light/Professional Blue Palette (mimicking educational quick judge) */
            --bg: #EAEFF6;               /* Light slate-blue backdrop */
            --panel: #FFFFFF;            /* Pure white main layout board */
            --elevated: #F8FAFC;         /* Soft grey-white for tiles */
            --elevated-hover: #F1F5F9;   /* Sleek card hover shading */
            --border: #CBD5E1;           /* Fine separation border */
            --border-active: #2563EB;    /* Prominent Blue Border on focus */
            
            --accent: #2563EB;           /* Vivid Royal Blue (screenshot core) */
            --accent-glow: rgba(37, 99, 235, 0.15);
            
            --design: #8B5CF6;           /* Indigo-purple for design stage */
            --design-glow: rgba(139, 92, 246, 0.2);
            
            --develop: #0284C7;          /* Classic Teal-blue for development */
            --develop-glow: rgba(2, 132, 199, 0.25);
            
            --deploy: #059669;           /* Forest Green for staging */
            --deploy-glow: rgba(5, 150, 105, 0.2);
            
            --success: #059669;
            --warning: #D97706;
            --error: #DC2626;
            
            --text-pri: #0F172A;         /* Slate deep blue-black for readable text */
            --text-sec: #334155;         /* Medium slate grey for paragraphs */
            --text-muted: #64748B;       /* Low-contrast details */
            
            --shadow: 0 4px 12px rgba(15, 23, 42, 0.05);
            --shadow-lg: 0 10px 25px rgba(15, 23, 42, 0.08);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            transition: background-color 0.2s, border-color 0.2s;
        }

        /* Custom Scrollbars */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(37, 99, 235, 0.04) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(37, 99, 235, 0.03) 0%, transparent 40%);
            color: var(--text-pri);
            font-family: 'Inter', sans-serif;
            line-height: 1.5;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        /* Outer Frame styled perfectly like the screenshot */
        .window-frame {
            width: 100%;
            max-width: 980px; /* Reduced to remove excessive horizontal space */
            height: 84vh;     /* Reduced from 92vh to tighten vertical space */
            min-height: 580px;/* Elegant minimum height safeguarding layout */
            background: var(--panel);
            border: 2px solid var(--border-active); /* High intensity blue border */
            border-radius: 16px;
            box-shadow: var(--shadow-lg), 0 20px 40px rgba(15, 23, 42, 0.05);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: frameEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        @keyframes frameEnter {
            from { opacity: 0; transform: scale(0.97) translateY(15px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Top Title Bar */
        .window-header {
            background: #FFFFFF;
            border-bottom: 2px solid #E2E8F0;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .window-controls {
            display: flex; gap: 8px;
        }

        .window-dot {
            width: 12px; height: 12px; border-radius: 50%;
        }
        .window-dot.red { background: #FF5F56; }
        .window-dot.yellow { background: #FFBD2E; }
        .window-dot.green { background: #27C93F; }

        .window-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px; font-weight: 700; color: var(--text-sec);
            text-transform: uppercase; letter-spacing: 1.5px;
            display: flex; align-items: center; gap: 8px;
        }

        .window-title svg {
            color: var(--accent);
            animation: pulse-slow 2s infinite ease-in-out;
        }

        .audio-toggle {
            background: #F1F5F9;
            border: 1px solid #CBD5E1;
            padding: 6px 14px;
            border-radius: 8px;
            color: var(--text-sec);
            font-size: 11px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .audio-toggle:hover {
            color: var(--text-pri);
            border-color: var(--accent);
            background: #E2E8F0;
        }

        /* Interior Layout */
        .window-content {
            padding: 24px; 
            flex-grow: 1; 
            overflow: hidden;
            display: flex; 
            flex-direction: column; 
            position: relative;
            background-color: #FFFFFF;
            background-image: radial-gradient(#E2E8F0 1.2px, transparent 1.2px);
            background-size: 24px 24px;
            background-position: center;
        }

        h1, h2, h3, h4, .heading-font {
            font-family: 'Space Grotesk', sans-serif; 
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        button {
            cursor: pointer; 
            border: none; 
            border-radius: 8px;
            font-family: inherit; 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Glowing System Progress Rail */
        .progress-rail {
            display: flex; 
            width: 100%; 
            max-width: 900px;
            margin: 0 auto 24px; 
            justify-content: space-between; 
            flex-shrink: 0;
            gap: 20px;
        }

        .stage-track {
            flex: 1; 
            text-align: center; 
            position: relative;
        }

        .stage-label {
            font-size: 10px; 
            font-weight: 800; 
            letter-spacing: 1.5px;
            margin-bottom: 6px; 
            color: var(--text-sec);
            text-transform: uppercase;
        }

        .stage-bar {
            height: 6px; 
            background: #E2E8F0; 
            margin: 0;
            border-radius: 10px; 
            position: relative;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.4s ease;
        }

        .stage-bar.active { 
            background: var(--accent); 
            box-shadow: 0 0 12px var(--accent-glow);
        }
        .stage-bar.design.complete { 
            background: var(--design); 
            box-shadow: 0 0 12px var(--design-glow);
        }
        .stage-bar.develop.complete { 
            background: var(--develop); 
            box-shadow: 0 0 12px var(--develop-glow);
        }
        .stage-bar.deploy.complete { 
            background: var(--deploy); 
            box-shadow: 0 0 12px var(--deploy-glow);
        }

        .sub-dots {
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            margin-top: 8px;
        }

        .dot {
            width: 8px; 
            height: 8px; 
            border-radius: 50%; 
            background: #E2E8F0;
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .dot.active { 
            background: var(--accent); 
            transform: scale(1.4); 
            box-shadow: 0 0 10px var(--accent-glow);
            border-color: #93C5FD;
        }
        .dot.filled { 
            background: var(--text-sec); 
            border-color: var(--text-sec);
        }

        /* Layout Columns */
        .app-container {
            width: 100%; 
            display: flex; 
            gap: 24px; 
            flex-grow: 1; 
            min-height: 0;
        }

        .main-content {
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            min-height: 0;
            justify-content: space-between;
            overflow-y: auto;
            padding-right: 4px;
        }

        /* Sidebar: System Specs / Architectural Log */
        .sidebar {
            width: 280px; 
            background: #F8FAFC; 
            border: 1.5px solid var(--border);
            border-radius: 12px; 
            padding: 18px; 
            height: 100%; 
            box-shadow: var(--shadow);
            display: none; 
            flex-direction: column;
            gap: 12px;
            overflow: hidden;
            animation: slideInRight 0.4s ease;
        }

        @keyframes slideInRight {
            from { transform: translateX(20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .decision-log-container {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 4px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Elegant Gameplay Cards */
        .card {
            background: #FFFFFF; 
            border: 1.5px solid var(--border); 
            border-radius: 14px;
            padding: 24px; 
            box-shadow: var(--shadow);
            animation: cardFadeIn 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), transparent);
            opacity: 0.8;
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .options-container {
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 16px; 
            margin-top: 20px;
        }

        /* Choice options styled highly reactive and pristine */
        .decision-card {
            background: #F8FAFC; 
            border: 2px solid #E2E8F0; 
            border-radius: 12px;
            padding: 18px; 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            height: 100%;
            position: relative;
            overflow: hidden;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .decision-card:hover {
            transform: translateY(-4px); 
            border-color: var(--accent); 
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.08);
            background: #FFFFFF;
        }

        .decision-card.selected {
            border-color: var(--accent); 
            background: #EFF6FF;
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.12);
        }

        .decision-card.selected::after {
            content: '✓';
            position: absolute;
            top: 10px; right: 12px;
            color: var(--accent);
            font-weight: bold;
            font-size: 14px;
        }

        .badge {
            display: inline-flex; 
            align-items: center;
            gap: 4px;
            padding: 3px 8px; 
            border-radius: 6px;
            font-size: 9px; 
            font-weight: 800; 
            text-transform: uppercase; 
            margin-bottom: 12px;
            align-self: flex-start;
        }

        .badge-best { background: #ECFDF5; color: #047857; border: 1.2px solid #A7F3D0; }
        .badge-shortcut { background: #FFFBEB; color: #B45309; border: 1.2px solid #FDE68A; }
        .badge-mistake { background: #FEF2F2; color: #B91C1C; border: 1.2px solid #FCA5A5; }

        /* Buttons & microinteractions matching screenshot blue */
        .btn-primary {
            background: var(--accent);
            color: white; 
            font-weight: 600;
            padding: 14px 28px; 
            width: auto; 
            min-width: 220px;
            font-size: 15px; 
            margin: 20px auto 0; 
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.2);
            border-radius: 8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.3px;
        }

        .btn-primary:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.35);
            background: #1D4ED8;
        }

        .btn-primary:active {
            transform: translateY(1px);
        }

        /* Countdown Visual Overlay */
        #launch-overlay {
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background: rgba(241, 245, 249, 0.98); 
            display: none; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            z-index: 1000; 
            text-align: center;
            backdrop-filter: blur(10px);
        }

        /* Mission Control dashboard panels */
        .dashboard-grid {
            display: grid; 
            grid-template-columns: 1.2fr 1.8fr; 
            gap: 24px; 
            flex-grow: 1; 
            min-height: 0;
        }

        .metrics-panel, .alerts-panel {
            overflow-y: auto; 
            padding-right: 6px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .metric-card {
            background: #F8FAFC; 
            padding: 16px; 
            border-radius: 10px;
            border-left: 4px solid var(--success); 
            box-shadow: var(--shadow); 
            font-size: 13px; 
            color: var(--text-sec);
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            border-top: 1px solid #E2E8F0;
            border-right: 1px solid #E2E8F0;
            border-bottom: 1px solid #E2E8F0;
        }

        .alert-card {
            background: #FEF2F2; 
            border: 1.5px solid #FCA5A5; 
            border-radius: 12px;
            padding: 16px; 
            cursor: pointer; 
            display: flex;
            gap: 12px;
            align-items: flex-start;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.02);
        }

        .alert-card:hover { 
            transform: scale(1.015) translateY(-2px);
            border-color: var(--error);
            box-shadow: 0 6px 16px rgba(220, 38, 38, 0.08);
            background: #FEE2E2;
        }

        .alert-icon-ring {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #FCA5A5;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #B91C1C;
            flex-shrink: 0;
            animation: pulse-danger 1.5s infinite ease-in-out;
        }

        @keyframes pulse-danger {
            0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(220, 38, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }

        .diagnosis-pane {
            margin-top: 16px;
            padding: 18px;
            border-radius: 12px;
            background: #F8FAFC;
            border: 1.5px solid #E2E8F0;
            animation: slideUp 0.3s ease;
        }

        .diagnosis-panel {
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
            margin-top: 14px;
        }

        /* Stage Headers */
        .stage-banner {
            display: inline-flex; 
            align-items: center;
            gap: 6px;
            padding: 6px 14px; 
            border-radius: 100px;
            font-size: 10px; 
            font-weight: 800; 
            letter-spacing: 0.8px; 
            margin-bottom: 12px;
        }
        .bg-design { background: #F5F3FF; color: #6D28D9; border: 1px solid #DDD6FE; }
        .bg-develop { background: #F0F9FF; color: #0369A1; border: 1px solid #BAE6FD; }
        .bg-deploy { background: #ECFDF5; color: #047857; border: 1px solid #A7F3D0; }

        .icon-lg { 
            width: 72px; 
            height: 72px; 
            margin-bottom: 20px; 
            filter: drop-shadow(0 4px 8px rgba(37, 99, 235, 0.15));
        }

        /* Inline Static Visualizations */
        .telemetry-graph-container {
            background: #F8FAFC;
            border-radius: 10px;
            border: 1.5px solid #E2E8F0;
            padding: 14px;
            margin-bottom: 12px;
            height: 145px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .telemetry-chart-legend {
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            color: var(--text-sec);
        }

        .telemetry-legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .telemetry-dot-legend {
            width: 6px; height: 6px; border-radius: 50%;
        }

        /* Tabs for Debrief Feedback */
        .step-selector {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin: 16px 0;
            flex-shrink: 0;
        }

        .step-tab {
            padding: 10px;
            border: 1.5px solid #E2E8F0;
            border-radius: 8px;
            background: #F8FAFC;
            cursor: pointer;
            text-align: center;
            transition: all 0.25s ease;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-sec);
        }

        .step-tab:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .step-tab.active {
            border-color: var(--accent);
            background: #EFF6FF;
            color: var(--accent);
            box-shadow: 0 0 10px rgba(37, 99, 235, 0.1);
        }

        .detail-display {
            flex-grow: 1;
            background: #FFFFFF;
            border: 1.5px solid #E2E8F0;
            border-radius: 12px;
            padding: 24px;
            overflow-y: auto;
            min-height: 0;
        }

        /* Utilities */
        .hidden { display: none !important; }
        .text-accent { color: var(--accent); }
        .text-center { text-align: center; }
        
        .code-font {
            font-family: 'Fira Code', monospace;
            font-size: 11px;
        }

        /* Score Display layout */
        .metric-score-widget {
            background: #F8FAFC;
            border: 1px solid #E2E8F0;
            border-radius: 10px;
            padding: 14px;
            text-align: center;
            box-shadow: var(--shadow);
            flex: 1;
        }

        /* Animation Keyframes */
        @keyframes pulse-slow {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.08); opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(15px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media (max-width: 950px) {
            .options-container, .diagnosis-panel { grid-template-columns: 1fr; }
            .dashboard-grid { grid-template-columns: 1fr; }
            .window-frame { height: 100vh; border-radius: 0; }
            .window-content { overflow-y: auto; }
            .step-selector { grid-template-columns: repeat(3, 1fr); gap: 6px; }
        }
    </style>
</head>
<body>

    <div class="window-frame">
        <div class="window-header">
            <div class="window-controls">
                <div class="window-dot red"></div>
                <div class="window-dot yellow"></div>
                <div class="window-dot green"></div>
            </div>
            <div class="window-title"></div>
        </div>

        <div class="window-content">
            <!-- Neon Stage Tracker Rail -->
            <div id="progress-container" class="progress-rail hidden">
                <div class="stage-track">
                    <div class="stage-label">DESIGN PHASE</div>
                    <div class="stage-bar design" id="bar-0"></div>
                    <div class="sub-dots">
                        <div class="dot" id="dot-0"></div>
                        <div class="dot" id="dot-1"></div>
                    </div>
                </div>
                <div class="stage-track">
                    <div class="stage-label">DEVELOPMENT PHASE</div>
                    <div class="stage-bar develop" id="bar-1"></div>
                    <div class="sub-dots">
                        <div class="dot" id="dot-2"></div>
                        <div class="dot" id="dot-3"></div>
                    </div>
                </div>
                <div class="stage-track">
                    <div class="stage-label">DEPLOYMENT PHASE</div>
                    <div class="stage-bar deploy" id="bar-2"></div>
                    <div class="sub-dots">
                        <div class="dot" id="dot-4"></div>
                        <div class="dot" id="dot-5"></div>
                    </div>
                </div>
            </div>

            <!-- Main Flex Content Box -->
            <div class="app-container">
                <main class="main-content" id="screen-container">
                    <!-- Screen HTML will be injected dynamically -->
                </main>
                
                <!-- Release Specs / Decision Log Registry Sidebar -->
                <aside class="sidebar" id="sidebar">
                    <h3 class="heading-font" style="font-size: 11px; color: var(--text-sec); letter-spacing: 1.5px; border-bottom: 1.5px solid var(--border); padding-bottom: 8px;">SYSTEM ARCHITECTURE</h3>
                    <div class="decision-log-container" id="decision-log"></div>
                    <div class="code-font" style="color: var(--text-muted); font-size: 10px; border-top: 1px solid var(--border); padding-top: 8px;">
                        STUDYMATCH STATUS: IDLE<br>
                        INTEGRITY CODE: SM-9192
                    </div>
                </aside>
            </div>

            <!-- Interstitial Fullscreen Rocket Launch Sequence -->
            <div id="launch-overlay">
                <h1 id="countdown" class="heading-font" style="font-size: 120px; color: var(--accent); filter: drop-shadow(0 0 25px rgba(99,102,241,0.5));">3</h1>
                <div id="launch-text" class="hidden" style="animation: slideUp 0.5s ease;">
                    <div class="stage-banner bg-deploy" style="margin-bottom: 16px;">DEPLOYMENT COMPLETE</div>
                    <h1 class="heading-font" style="font-size: 42px; color: var(--text-pri); text-shadow: 0 0 20px rgba(16, 185, 129, 0.4);">S-CORE ENGAGED</h1>
                    <p style="color: var(--text-sec); font-size: 15px; margin-top: 8px;">2,400 students active. Recalibrating matching matrices...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Web Audio Synthesizer Engine ---
        let audioMuted = true;
        let audioCtx = null;

        function initSynth() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            } catch (err) {
                console.warn('Audio Context initialization blocked by browser/iframe policy', err);
            }
        }

        function playSynth(type, duration = 0.1) {
            if (audioMuted) return;
            initSynth();
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                if (type === 'select') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(440, audioCtx.currentTime); 
                    osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + duration);
                    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                } else if (type === 'click') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(520, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                } else if (type === 'countdown') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(330, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                } else if (type === 'launch') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(80, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + duration);
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                } else if (type === 'correct') {
                    osc.type = 'sine';
                    const now = audioCtx.currentTime;
                    osc.frequency.setValueAtTime(523.25, now); // C5
                    osc.frequency.setValueAtTime(659.25, now + 0.1); // E5
                    osc.frequency.setValueAtTime(783.99, now + 0.2); // G5
                    gain.gain.setValueAtTime(0.08, now);
                    gain.gain.linearRampToValueAtTime(0.001, now + 0.45);
                    duration = 0.5;
                } else if (type === 'alarm') {
                    osc.type = 'sawtooth';
                    const now = audioCtx.currentTime;
                    osc.frequency.setValueAtTime(220, now);
                    osc.frequency.linearRampToValueAtTime(110, now + 0.15);
                    osc.frequency.linearRampToValueAtTime(220, now + 0.3);
                    gain.gain.setValueAtTime(0.07, now);
                    gain.gain.linearRampToValueAtTime(0.001, now + 0.3);
                    duration = 0.3;
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth';
                    const now = audioCtx.currentTime;
                    osc.frequency.setValueAtTime(180, now);
                    osc.frequency.setValueAtTime(130, now + 0.1);
                    gain.gain.setValueAtTime(0.08, now);
                    gain.gain.linearRampToValueAtTime(0.001, now + 0.25);
                    duration = 0.35;
                }

                osc.start();
                osc.stop(audioCtx.currentTime + duration);

            area.innerHTML = `
                <div class="card" style="margin-top: 16px; border: 2.2px solid ${isCorrect ? 'var(--success)' : 'var(--error)'}; background: #FFFFFF; animation: slideUp 0.25s ease;">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span style="font-size: 20px;">${isCorrect ? '✓' : '✗'}</span>
                        <h4 style="color: ${isCorrect ? 'var(--success)' : 'var(--error)'}; font-size: 16px;">${isCorrect ? 'CORRECT RE-INTEGRATIVE ROOT LOCATED' : 'TRACE DIAGNOSIS UNALIGNED'}</h4>
                    </div>
                    <p style="font-size: 13px; margin-top: 6px; color: var(--text-sec); line-height: 1.5;">
                        ${isCorrect ? 
                            `Correct! This systematic flaw originated during the <strong>${step.subStep}</strong> of your AI system. Neglecting these standards causes real-world biases that accumulate silently.` : 
                            `Incorrect diagnostic vector. This precise flaw is a direct consequence of decisions taken in the <strong>${step.subStep}</strong> stage of the lifecycle.`
                        }
                    </p>
                    <button class="btn-primary" style="margin-top: 14px; font-size: 12px; min-width: 140px; padding: 10px 20px;" onclick="finishDiagnosis('${failId}')">EXECUTE RESOLUTION CONSOLE</button>
                </div>
            `;
        }

        function finishDiagnosis(failId) {
            playSynth('click');
            const alert = document.getElementById(`alert-${failId}`);
            if (alert) { 
                alert.style.opacity = '0.4'; 
                alert.style.pointerEvents = 'none'; 
                alert.style.borderColor = 'var(--border)';
            }
            document.getElementById('diagnosis-area').innerHTML = '';
            
            if (STATE.diagnosisResults.length === STATE.activeFailures.length) {
                document.getElementById('diagnosis-area').innerHTML = `
                    <div style="display:flex; justify-content:center; width:100%; margin-top: 16px;">
                        <button class="btn-primary" onclick="playSynth('correct'); goTo('FEEDBACK')" style="width: 100%;">
                            DIAGNOSTICS COMPLETE: PROCEED TO DEBRIEF →
                        </button>
                    </div>
                `;
            }
        }
        
        // Boot first screen
        render();
    </script>
</body>
</html>
