<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turing Test Examiner: Behavioral Analysis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1d4ed8; /* High-contrast Royal Blue (WCAG 2.1 compliant) */
            --primary-light: #eff6ff;
            --primary-hover: #1e40af;
            --accent: #0f766e; /* Accessible Teal */
            --human-color: #047857; /* Deep emerald green for rich contrast (>4.5:1) */
            --human-light: #f0fdf4;
            --ai-color: #4f46e5; /* Deep purple-indigo */
            --ai-light: #f5f3ff;
            --warn-color: #b45309; /* Deep amber */
            --error-color: #b91c1c; /* Deep red for warning contrast */
            --error-light: #fef2f2;
            --text-dark: #0f172a;
            --text-muted: #475569; /* Extra dark gray for readibility */
            --bg-page: #f1f5f9;
            --white: #ffffff;
            --border: #cbd5e1; /* Increased contrast for field lines */
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* High contrast focus outline for ADA compliant keyboard navigation */
        *:focus-visible {
            outline: 3px solid var(--primary) !important;
            outline-offset: 3px !important;
            border-radius: 6px;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Strict no scrolling */
            padding: 1rem;
        }

        #app-container {
            width: 100%;
            max-width: 1100px;
            height: 100%;
            max-height: 850px;
            background: var(--white);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-lg);
            overflow: hidden; /* Strict no scrolling */
            border: 6px solid var(--primary); /* Deep royal blue border representing the Turing cage */
        }

        header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--white);
            flex-shrink: 0; 
            z-index: 10;
        }

        .logo-area h1 {
            font-size: 1.1rem;
            color: var(--primary);
            font-weight: 700;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .progress-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .progress-label {
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .progress-dots { display: flex; gap: 6px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: var(--transition); }
        .dot.active { background: var(--primary); transform: scale(1.4); }

        footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--white);
            flex-shrink: 0;
        }

        main {
            flex: 1; 
            min-height: 0; /* Critical for flexbox non-scrolling */
            display: flex;
            background: var(--bg-page);
            padding: 1.25rem;
            position: relative;
            overflow: hidden; /* Strict no scrolling */
        }

        .scene {
            display: none;
            opacity: 0;
            transform: translateY(10px);
            transition: var(--transition);
            flex: 1;
            min-height: 0; 
            width: 100%;
            overflow: hidden; /* Strict no scrolling */
        }

        .scene.active {
            display: flex;
            flex-direction: column;
            opacity: 1;
            transform: translateY(0);
        }

        .content-card {
            background: var(--white);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            flex: 1;
            min-height: 0; 
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden; /* Strict no scrolling */
        }

        .intro-view {
            text-align: center;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Center content vertically since no scrolling */
        }

        .icon-circle {
            width: 50px;
            height: 50px;
            background: var(--primary-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            flex-shrink: 0;
        }
        .icon-circle svg { width: 28px; height: 28px; fill: var(--primary); }

        .term-details { 
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; /* Side-by-side horizontal alignment */
            gap: 1rem;
            width: 100%;
            margin-top: 1.5rem; 
            border-top: 1px solid var(--border); 
            padding-top: 1.5rem; 
            flex-shrink: 0;
        }
        
        .term-item { 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            padding: 0.85rem; 
            cursor: pointer; 
            transition: var(--transition); 
            background: var(--white); 
            box-shadow: var(--shadow-sm); 
            display: flex;
            flex-direction: column;
            text-align: left;
        }
        .term-item:hover { border-color: var(--primary); transform: translateY(-1px); }
        .term-item.active { border-color: var(--primary); background: var(--primary-light); }
        .term-item strong { color: var(--primary); font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; }
        .term-item strong::after { content: '+'; font-size: 1.2rem; transition: transform 0.3s; }
        .term-item.active strong::after { content: '−'; transform: rotate(180deg); }
        .term-item p { font-size: 0.75rem; color: var(--text-dark); margin-top: 0.5rem; display: none; line-height: 1.4; }
        .term-item.active p { display: block; animation: fadeIn 0.3s ease; }

        .briefing-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 1.5rem;
            flex: 1;
            min-height: 0;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            padding-right: 8px;
        }

        .tab-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--white);
            border: 1px solid var(--border);
            padding: 0.65rem 0.85rem;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-weight: 600;
            color: var(--text-muted);
            transition: var(--transition);
            font-size: 0.75rem;
            line-height: 1.3;
        }

        .tab-btn:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
        .tab-btn.active { background: var(--primary); color: var(--white); border-color: var(--primary); }

        .session-grid {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 1.5rem;
            flex: 1;
            min-height: 0;
        }

        .chat-display {
            background: #f1f5f9; 
            border-radius: 12px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centers short chats naturally without scrolling */
            gap: 1rem;
            border: 1px solid var(--border);
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.03);
            overflow: hidden; /* Strict no scrolling */
        }

        .msg-wrapper { display: flex; flex-direction: column; max-width: 85%; }
        .msg-wrapper.examiner { align-self: flex-start; }
        .msg-wrapper.respondent { align-self: flex-end; align-items: flex-end; }

        .msg-label {
            font-size: 0.6rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 4px;
            margin-left: 8px;
            margin-right: 8px;
            letter-spacing: 0.5px;
        }

        .message {
            padding: 0.75rem 1rem;
            border-radius: 18px;
            font-size: 0.85rem;
            line-height: 1.4;
            box-shadow: var(--shadow-sm);
        }

        .msg-examiner {
            background: var(--white);
            color: var(--text-dark);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .msg-respondent {
            background: var(--primary);
            color: var(--white);
            border-bottom-right-radius: 4px;
        }

        .controls-area {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            flex: 1;
            min-height: 0;
            padding-right: 4px;
        }

        .section-header {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .rules-card {
            background: var(--primary-light);
            padding: 0.65rem;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            font-size: 0.7rem;
            line-height: 1.3;
            flex-shrink: 0;
        }

        .verdict-options { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; flex-shrink: 0; }

        .control-btn {
            background: var(--white);
            border: 1px solid var(--border);
            padding: 0.6rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            text-align: center;
            font-size: 0.75rem;
        }

        .control-btn:hover { border-color: var(--primary); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
        .control-btn.active.human { background: var(--human-color); color: white; border-color: var(--human-color); }
        .control-btn.active.ai { background: var(--ai-color); color: white; border-color: var(--ai-color); }

        .indicator-checks {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 columns, fits perfectly */
            gap: 0.35rem;
        }

        .check-pill {
            display: flex;
            align-items: flex-start;
            gap: 6px;
            font-size: 0.65rem;
            padding: 0.4rem;
            background: var(--bg-page);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            user-select: none;
            transition: var(--transition);
            line-height: 1.2;
        }

        .check-pill:hover { border-color: var(--primary); background: var(--white); box-shadow: var(--shadow-sm); transform: translateY(-1px); }
        .check-pill input { margin-top: 1px; accent-color: var(--primary); width: 12px; height: 12px; }

        .btn {
            padding: 0.6rem 1.25rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-family: inherit;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary { background: var(--primary); color: var(--white); box-shadow: var(--shadow-sm); }
        .btn-primary:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-dark); }
        .btn-outline:hover:not(:disabled) { background: var(--bg-page); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        @keyframes pulseBtn {
            0% { box-shadow: 0 0 0 0 rgba(29, 78, 216, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(29, 78, 216, 0); }
            100% { box-shadow: 0 0 0 0 rgba(29, 78, 216, 0); }
        }
        .btn-pulse { animation: pulseBtn 2s infinite; }

        @keyframes stampSlam {
            0% { transform: scale(2) rotate(-15deg); opacity: 0; }
            100% { transform: scale(1) rotate(-3deg); opacity: 1; }
        }

        .reveal-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.99);
            z-index: 20;
            display: none;
            flex-direction: column;
            padding: 1.5rem;
            justify-content: center;
            overflow-y: auto; /* ADA accessibility scroll support */
        }

        .reveal-overlay.active { display: flex; animation: fadeIn 0.3s ease; }

        .reveal-header { text-align: center; margin-bottom: 1rem; flex-shrink: 0; }

        .stamp {
            display: inline-block;
            padding: 0.4rem 1.2rem;
            border: 4px solid;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
            transform: rotate(-3deg);
            opacity: 0;
        }

        .reveal-overlay.active .stamp { animation: stampSlam 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .stamp.human { color: var(--human-color); border-color: var(--human-color); }
        .stamp.ai { color: var(--ai-color); border-color: var(--ai-color); }

        .feedback-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); /* Auto-distributes horizontally */
            gap: 0.5rem;
            width: 100%;
        }

        .feedback-item {
            padding: 0.6rem;
            border-radius: 8px;
            font-size: 0.7rem;
            line-height: 1.4;
            border-left: 4px solid;
            background: var(--bg-page);
        }

        .feedback-item.success { border-color: var(--human-color); background: var(--human-light); }
        .feedback-item.error { border-color: var(--error-color); background: var(--error-light); }
        .feedback-item.missed { border-color: var(--text-muted); background: var(--white); border: 1px solid var(--border); border-left: 4px solid var(--text-muted); }
        .feedback-item strong { display: block; margin-bottom: 0.2rem; font-size: 0.75rem; color: var(--text-dark); }

        .expert-reason {
            margin-top: 1rem;
            padding: 0.85rem;
            background: var(--primary-light);
            border-radius: 8px;
            font-size: 0.8rem;
            line-height: 1.5;
            color: var(--text-dark);
            text-align: center;
            border: 1px solid #dbeafe;
            width: 100%;
        }

        .rank-container { 
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 columns, side-by-side */
            gap: 0.5rem;
        }
        
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 0.7rem 1rem; background: var(--white); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 0.8rem; transition: var(--transition); box-shadow: var(--shadow-sm); }
        .rank-item:hover { border-color: var(--primary); transform: translateY(-1px); }
        .rank-item.selected { border-color: var(--primary); background: var(--primary-light); }
        .rank-badge { background: var(--primary); color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.65rem; font-weight: 700; }

        .results-table { width: 100%; border-collapse: collapse; margin: 0; font-size: 0.75rem; }
        .results-table th { padding: 0.4rem 0.2rem; text-align: left; border-bottom: 2px solid var(--border); color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 0.65rem; letter-spacing: 0.5px; }
        .results-table td { padding: 0.5rem 0.2rem; text-align: left; border-bottom: 1px solid var(--border); }
        .results-table tr:last-child td { border-bottom: none; }

        .ind-icon {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2.25;
            stroke-linecap: round;
            stroke-linejoin: round;
            display: inline-block;
            vertical-align: middle;
            flex-shrink: 0;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="app-container">
    <header role="banner">
        <div class="logo-area" style="display: flex; align-items: center; gap: 10px;">
            <svg style="width: 28px; height: 28px; stroke: var(--primary); fill: none; stroke-width: 2.25;" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
                <path d="M11 8a3 3 0 0 0-3 3" />
            </svg>
            <div style="display: flex; flex-direction: column;">
                <h1 style="font-size: 1.1rem; line-height: 1.2;">Turing Test Examiner</h1>
            </div>
        </div>
        <div style="display: flex; align-items: center; gap: 16px;">
            <div id="accuracy-display" style="display: none; align-items: center; gap: 6px; background: var(--primary-light); color: var(--primary); padding: 0.35rem 0.85rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 700; border: 1px solid #bfdbfe;" role="status" aria-live="polite">
                <svg style="width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2;" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="10" />
                    <circle cx="12" cy="12" r="6" />
                    <circle cx="12" cy="12" r="2" />
                </svg> Accuracy: <span id="accuracy-percentage">0%</span>
            </div>
            <div class="progress-container">
                <div class="progress-label" id="progress-text">Intro</div>
                <div class="progress-dots" id="dots-container" role="img" aria-label="Simulated test step markers"></div>
            </div>
        </div>
    </header>

    <main id="stage">
        <!-- Scenes rendered dynamically via JS -->
    </main>

    <footer>
        <button class="btn btn-outline" id="btn-restart" onclick="restart()">Restart</button>
        <div style="display:flex; gap:12px;">
            <button class="btn btn-outline" id="btn-back" onclick="changeStep(-1)">Back</button>
            <button class="btn btn-primary" id="btn-next" onclick="changeStep(1)">Next</button>
        </div>
    </footer>
</div>

<script>
    const INDICATORS = [
        { 
            id: "emot", 
            title: "Emotional Authenticity", 
            icon: `<svg class="ind-icon" viewBox="0 0 24 24"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" /></svg>`,
            desc: "Does the response convey genuine feeling — uncertainty, humor, embarrassment, nostalgia? Or does it describe emotions without seeming to experience them?" 
        },
        { 
            id: "prec", 
            title: "Unusual Precision", 
            icon: `<svg class="ind-icon" viewBox="0 0 24 24"><path d="M21.3 15.3a2.82 2.82 0 0 1 0 4c-1 1-2.5 1-3.5 0L2.3 3.8a2.82 2.82 0 0 1 0-4c1-1 2.5-1 3.5 0Z" /><path d="m5.6 11.1 1.4-1.4" /><path d="m7.2 12.5 2.8-2.8" /><path d="m10 15.3 1.4-1.4" /><path d="m11.6 16.7 2.8-2.8" /><path d="m14.4 19.5 1.4-1.4" /></svg>`,
            desc: "Is the response suspiciously complete, well-structured, and free of hesitation? Humans usually ramble, trail off, or contradict themselves." 
        },
        { 
            id: "tang", 
            title: "Unexpected Tangent", 
            icon: `<svg class="ind-icon" viewBox="0 0 24 24"><path d="M18 3a3 3 0 1 0 0 6 3 3 0 0 0 0-6z" /><path d="M6 15a3 3 0 1 0 0 6 3 3 0 0 0 0-6z" /><path d="M18 15a3 3 0 1 0 0 6 3 3 0 0 0 0-6z" /><path d="M18 8h-3a4 4 0 0 0-4 4v2a4 4 0 0 1-4 4H6" /><path d="M11 12h7" /></svg>`,
            desc: "Did the respondent go off-topic in a natural, personal way — the way humans do when something reminds them of something else?" 
        },
        { 
            id: "gram", 
            title: "Grammatical Imperfection", 
            icon: `<svg class="ind-icon" viewBox="0 0 24 24"><path d="M12 20h9" /><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z" /><path d="m15 5 3 3" /><path d="M3 10a4 4 0 0 1 4-4" /></svg>`,
            desc: "Humans make typos, use informal grammar, skip capitalization, or write in fragments. Perfect grammar can be a signal." 
        },
        { 
            id: "uncer", 
            title: "Hedging and Uncertainty", 
            icon: `<svg class="ind-icon" viewBox="0 0 24 24"><line x1="12" y1="3" x2="12" y2="21" /><line x1="12" y1="12" x2="21" y2="9" /><line x1="12" y1="12" x2="3" y2="15" /><path d="M5 21a2 2 0 0 0-2-2h18a2 2 0 0 0-2 2" /></svg>`,
            desc: "Humans say 'I think', 'maybe', 'I dunno', 'it depends'. AI systems often answer with more confidence than the question warrants." 
        },
        { 
            id: "self", 
            title: "Self-Reference", 
            icon: `<svg class="ind-icon" viewBox="0 0 24 24"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></svg>`,
            desc: "Does the respondent mention their own physical experience, personal history, or something they personally felt or witnessed?" 
        },
        { 
            id: "know", 
            title: "Knowledge Precision", 
            icon: `<svg class="ind-icon" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" /><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" /></svg>`,
            desc: "Does the respondent produce an unusually detailed, accurate, and comprehensive answer for a casual conversation? Humans often say 'I don't know' or guess." 
        },
        { 
            id: "tonal", 
            title: "Tonal Consistency", 
            icon: `<svg class="ind-icon" viewBox="0 0 24 24"><path d="M3 10v4" /><path d="M6 6v12" /><path d="M9 4v16" /><path d="M12 7v10" /><path d="M15 5v14" /><path d="M18 8v8" /><path d="M21 10v4" /></svg>`,
            desc: "Does the tone stay unnaturally consistent throughout — always helpful, always measured? Humans shift tone based on how the conversation makes them feel." 
        }
    ];

            document.querySelectorAll('.control-btn').forEach(b => b.classList.remove('active', 'human', 'ai'));
            const btn = document.getElementById(v === 'HUMAN' ? 'v-human' : 'v-ai');
            if (btn) btn.classList.add('active', v.toLowerCase());
        }
        checkSessionReady();
    }

    function showIndicatorHelp(desc) {
        const tip = document.getElementById('indicator-hover-desc');
        if (tip) {
            tip.innerHTML = `<strong>Psychological Trigger:</strong> ${desc}`;
        }
    }

    function resetIndicatorHelp() {
        const tip = document.getElementById('indicator-hover-desc');
        if (tip) {
            tip.innerHTML = `<em>Pro-Tip: Hover or focus on any indicator above to decode its psychological trigger.</em>`;
        }
    }

    function updateHeaderScore() {
        const totalCompleted = state.verdicts.filter(v => v !== undefined).length;
        const correctCount = state.verdicts.filter(v => v && v.isCorrect).length;
        const accuracyDisplay = document.getElementById('accuracy-display');
        if (accuracyDisplay) {
            if (totalCompleted > 0) {
                const pct = Math.round((correctCount / totalCompleted) * 100);
                document.getElementById('accuracy-percentage').innerText = `${pct}% (${correctCount}/${totalCompleted})`;
                accuracyDisplay.style.display = 'flex';
                accuracyDisplay.style.display = 'inline-flex';
            } else {
                accuracyDisplay.style.display = 'none';
            }
        }
    }

    function checkSessionReady() {
        const hasV = document.querySelector('.control-btn.active');
        const hasCheck = document.querySelectorAll('.ind-check:checked').length > 0;
        const btn = document.getElementById('btn-submit-judgment');
        
        if (hasV && hasCheck) {
            btn.disabled = false;
            btn.classList.add('btn-pulse');
        } else {
            btn.disabled = true;
            btn.classList.remove('btn-pulse');
        }
    }

    function submitJudgment(idx) {
        document.getElementById('btn-submit-judgment').classList.remove('btn-pulse');
        
        const activeV = document.querySelector('.control-btn.active');
        const vText = activeV.textContent.trim();
        const session = SESSIONS[idx];
        const isCorrect = vText === session.id;
        
        const studentKeys = Array.from(document.querySelectorAll('.ind-check:checked')).map(cb => cb.value);
        state.verdicts[idx] = { verdict: vText, isCorrect, studentKeys };

        // Update the dynamic scoreboard in header
        updateHeaderScore();

        const expertKeys = session.keys;
        const truePos = studentKeys.filter(k => expertKeys.includes(k));
        const falsePos = studentKeys.filter(k => !expertKeys.includes(k));
        const falseNeg = expertKeys.filter(k => !studentKeys.includes(k));

        let feedbackHTML = `
            <div class="reveal-header">
                <div class="stamp ${session.id.toLowerCase()}" style="animation: stampSlam 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;">IDENTITY: ${session.id}</div>
                <h3 style="font-size: 1.25rem; color: ${isCorrect ? 'var(--human-color)' : 'var(--error-color)'}; margin-bottom: 0.25rem;">
                    ${isCorrect ? 'Correct Judgment!' : 'You were fooled.'}
                </h3>
            </div>
            <div class="feedback-container">
        `;

        if (truePos.length > 0) {
            feedbackHTML += truePos.map(k => {
                const ind = INDICATORS.find(i => i.id === k);
                return `<div class="feedback-item success"><strong style="display: flex; align-items: center; gap: 6px;">✅ Correctly Identified: ${ind.icon} <span>${ind.title}</span></strong><p>${session.keyReasons[k]}</p></div>`;
            }).join('');
        }

        if (falsePos.length > 0) {
            feedbackHTML += falsePos.map(k => {
                const ind = INDICATORS.find(i => i.id === k);
                return `<div class="feedback-item error"><strong style="display: flex; align-items: center; gap: 6px;">❌ Incorrectly Flagged: ${ind.icon} <span>${ind.title}</span></strong><p>${FALSE_POSITIVE_FEEDBACK[k]}</p></div>`;
            }).join('');
        }

        if (falseNeg.length > 0) {
            feedbackHTML += falseNeg.map(k => {
                const ind = INDICATORS.find(i => i.id === k);
                return `<div class="feedback-item missed"><strong style="display: flex; align-items: center; gap: 6px; color: var(--text-muted);">${ind.icon} <span style="font-weight:700;">Missed: ${ind.title}</span></strong><p>${session.keyReasons[k]}</p></div>`;
            }).join('');
        }

        feedbackHTML += `
            </div>
            <div class="expert-reason"><strong>Expert Summary:</strong> ${session.reason}</div>
            <div style="text-align: center; margin-top: 1rem; flex-shrink: 0;">
                <button class="btn btn-primary" onclick="changeStep(1)">Next Session &rarr;</button>
            </div>
        `;

        const overlay = document.getElementById(`reveal-${idx}`);
        overlay.innerHTML = feedbackHTML;
        overlay.classList.add('active');
    }

    function handleElizaChoice(idx, btn) {
        const feedbacks = [
            "That's the ELIZA Effect. Modern language models are specifically trained to be fluent — which makes surface-level detection increasingly unreliable.",
            "This is the most honest answer. The 'feel' of a conversation often precedes our ability to articulate what's specifically different.",
            "Confidence is key! You may find the remaining sessions more challenging as the patterns shift.",
            "LLMs are optimized to sound confident and coherent. In some domains, they out-perform human writing style — which is exactly what makes the Turing Test relevant again."
        ];

        // Hide prompt and other buttons to clean up the screen
        document.getElementById('eliza-prompt').style.display = 'none';
        const grid = document.getElementById('eliza-btn-grid');
        grid.style.gridTemplateColumns = '1fr'; // Switch to full width
        
        Array.from(grid.children).forEach(b => {
            if (b !== btn) b.style.display = 'none';
        });

        // Transform the clicked button into a feedback card
        btn.onclick = null; // Remove hover/click effects
        btn.style.cursor = 'default';
        btn.style.borderColor = 'var(--primary)';
        btn.style.background = 'var(--primary-light)';
        btn.style.padding = '1.25rem';
        btn.style.transform = 'none';
        btn.style.boxShadow = 'none';
        
        const originalText = btn.getAttribute('data-original');
        
        btn.innerHTML = `
            <div style="font-size: 0.7rem; font-weight: 700; color: var(--primary); text-transform: uppercase; margin-bottom: 0.4rem; letter-spacing: 0.5px;">Your Experience:</div>
            <div style="font-size: 0.85rem; font-style: italic; color: var(--text-dark); margin-bottom: 1rem;">"${originalText}"</div>
            <div style="border-top: 1px solid #bfdbfe; padding-top: 0.85rem;">
                <div style="font-size: 0.7rem; font-weight: 700; color: var(--primary); text-transform: uppercase; margin-bottom: 0.4rem; letter-spacing: 0.5px;">Instructor Note:</div>
                <div style="font-size: 0.8rem; line-height: 1.4; color: var(--text-dark);">${feedbacks[idx]}</div>
            </div>
        `;
        
        document.getElementById('btn-next').disabled = false;
    }

    function handleReflection(idx, btn) {
        document.getElementById('reflection-btns').style.display = 'none';
        const feedbacks = [
            "This aligns with Turing's original view: if a machine's behavior is indistinguishable from a human's, we have no objective basis to deny its 'intelligence'.",
            "Many modern AI experts agree with you. This suggests the test measures human gullibility (the ELIZA effect) and the machine's ability to manipulate expectations."
        ];
        const fb = document.getElementById('reflection-feedback');
        fb.innerText = feedbacks[idx];
        fb.style.display = 'block';
    }

    function toggleRank(id, el) {
        if (state.ranking.includes(id)) {
            state.ranking = state.ranking.filter(i => i !== id);
            el.classList.remove('selected');
            el.setAttribute('aria-pressed', 'false');
            const b = el.querySelector('.rank-badge');
            if (b) b.remove();
        } else if (state.ranking.length < 3) {
            state.ranking.push(id);
            el.classList.add('selected');
            el.setAttribute('aria-pressed', 'true');
            const b = document.createElement('span');
            b.className = 'rank-badge';
            b.innerText = `#${state.ranking.length}`;
            el.appendChild(b);
        }
        
        if (state.ranking.length === 3) {
            document.getElementById('rank-reveal').style.display = 'block';
            document.getElementById('btn-next').disabled = false;
        }
    }

    function changeStep(dir) {
        const next = currentStep + dir;
        if (next >= 0 && next < SCENES.length) {
            currentStep = next;
            render();
        }
    }

    function updateUI() {
        const step = SCENES[currentStep];
        document.getElementById('btn-back').disabled = currentStep === 0;
        
        let nextDisabled = false;
        if (step.startsWith('session')) nextDisabled = true;
        if (step === 'interlude' && !document.getElementById('btn-next').disabled) nextDisabled = false; // Check if enabled by Eliza choice
        else if (step === 'interlude') nextDisabled = true;
        if (step === 'analysis' && state.ranking.length < 3) nextDisabled = true;
        
        document.getElementById('btn-next').disabled = nextDisabled;
        if (currentStep === SCENES.length - 1) document.getElementById('btn-next').style.display = 'none';
        else document.getElementById('btn-next').style.display = 'inline-flex';

        document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === currentStep));
        
        const dotsContainer = document.getElementById('dots-container');
        if (dotsContainer) {
            dotsContainer.setAttribute('aria-label', `Progress stepper: Step ${currentStep + 1} of ${SCENES.length}`);
        }
    }

    function restart() {
        currentStep = 0;
        state = { verdicts: [], ranking: [], elizaChoice: null };
        updateHeaderScore();
        render();
    }

    window.onload = init;
</script>
</body>
</html>
