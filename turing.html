<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turing Test Examiner: Behavioral Analysis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0056b3;
            --primary-light: #e7f1ff;
            --accent: #20c997;
            --human-color: #22C55E;
            --ai-color: #3B82F6;
            --text-dark: #212529;
            --text-muted: #6c757d;
            --bg-light: #f8f9fa;
            --white: #ffffff;
            --border: #dee2e6;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #e9ecef;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #app-container {
            width: 100%;
            max-width: 1024px;
            height: 768px;
            background: var(--white);
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        /* Header */
        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--white);
            z-index: 10;
        }

        .logo-area h1 {
            font-size: 1.25rem;
            color: var(--primary);
            font-weight: 700;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .progress-dots {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--border);
            transition: var(--transition);
        }

        .dot.active {
            background: var(--primary);
            transform: scale(1.2);
        }

        /* Main Stage */
        main {
            flex-grow: 1;
            position: relative;
            background: var(--bg-light);
            padding: 2rem;
            overflow-y: auto;
        }

        .scene {
            display: none;
            opacity: 0;
            transform: translateY(10px);
            transition: var(--transition);
            height: 100%;
            width: 100%;
        }

        .scene.active {
            display: flex;
            flex-direction: column;
            opacity: 1;
            transform: translateY(0);
        }

        /* Content Card */
        .content-card {
            background: var(--white);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Introduction View */
        .intro-view {
            text-align: center;
            max-width: 800px;
            margin: auto;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: var(--primary-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .icon-circle svg { width: 40px; height: 40px; fill: var(--primary); }

        /* Briefing View (Role-style) */
        .briefing-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
            height: 100%;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .tab-btn {
            background: var(--white);
            border: 1px solid var(--border);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-weight: 600;
            color: var(--text-muted);
            transition: var(--transition);
            font-size: 0.9rem;
        }

        .tab-btn:hover { border-color: var(--primary); color: var(--primary); }
        .tab-btn.active { background: var(--primary); color: var(--white); border-color: var(--primary); }

        /* Session View (Terminal Content card) */
        .session-grid {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 1.5rem;
            height: 100%;
        }

        .chat-display {
            background: #f1f3f5;
            border-radius: 8px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            border: 1px solid var(--border);
            overflow-y: auto;
        }

        .message {
            max-width: 85%;
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .msg-examiner {
            background: var(--white);
            color: var(--text-dark);
            border-left: 4px solid var(--text-muted);
            align-self: flex-start;
        }

        .msg-respondent {
            background: var(--primary-light);
            color: var(--primary);
            border-right: 4px solid var(--primary);
            align-self: flex-end;
            font-weight: 500;
        }

        /* Verdict Controls */
        .controls-area {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            overflow-y: auto;
            padding-right: 5px;
        }

        .verdict-options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.5rem;
        }

        .control-btn {
            background: var(--white);
            border: 1px solid var(--border);
            padding: 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            text-align: center;
        }

        .control-btn:hover { border-color: var(--primary); }
        .control-btn.active.human { background: var(--human-color); color: white; border-color: var(--human-color); }
        .control-btn.active.ai { background: var(--ai-color); color: white; border-color: var(--ai-color); }
        .control-btn.active.uncertain { background: #f59e0b; color: white; border-color: #f59e0b; }

        .indicator-checks {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.4rem;
        }

        .check-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            padding: 0.5rem;
            background: var(--bg-light);
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
        }

        /* Reveal Overlay */
        .reveal-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.98);
            z-index: 20;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            text-align: center;
        }

        .reveal-overlay.active { display: flex; animation: fadeIn 0.3s ease; }

        .stamp {
            padding: 0.5rem 1.5rem;
            border: 4px solid;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            transform: rotate(-3deg);
        }

        .stamp.human { color: var(--human-color); border-color: var(--human-color); }
        .stamp.ai { color: var(--ai-color); border-color: var(--ai-color); }

        /* Footer */
        footer {
            padding: 1rem 2rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--white);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-family: inherit;
        }

        .btn-primary { background: var(--primary); color: var(--white); }
        .btn-primary:hover:not(:disabled) { background: #004494; transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
        .btn-outline:hover { background: var(--bg-light); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Analysis Ranking */
        .rank-container {
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .rank-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
        }

        .rank-item.selected { border-color: var(--primary); background: var(--primary-light); }
        .rank-badge { background: var(--primary); color: white; padding: 0 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; height: 20px; line-height: 20px; }

        /* Results Table */
        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.9rem;
        }
        .results-table th, .results-table td {
            text-align: left;
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
        }
    </style>
</head>
<body>

<div id="app-container">
    <header>
        <div class="logo-area">
            <h1>Turing Test Examiner</h1>
        </div>
        <div class="progress-dots" id="dots-container"></div>
    </header>

    <main id="stage">
        <!-- Scenes rendered here -->
    </main>

    <footer>
        <button class="btn btn-outline" id="btn-restart" onclick="restart()">Restart</button>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-outline" id="btn-back" onclick="changeStep(-1)">Back</button>
            <button class="btn btn-primary" id="btn-next" onclick="changeStep(1)">Next</button>
        </div>
    </footer>
</div>

<script>
    const INDICATORS = [
        { id: "emot", title: "🧠 Emotional Authenticity", desc: "Does the response convey genuine feeling — uncertainty, humor, embarrassment, nostalgia? Or does it describe emotions without seeming to experience them?" },
        { id: "prec", title: "📐 Unusual Precision", desc: "Is the response suspiciously complete, well-structured, and free of hesitation? Humans usually ramble or trail off." },
        { id: "tang", title: "🎲 Unexpected Tangent", desc: "Did the respondent go off-topic in a natural, personal way — the way humans do when something reminds them of something else?" },
        { id: "gram", title: "✏️ Grammatical Imperfection", desc: "Humans make typos, use informal grammar, or write in fragments. Perfect grammar can be a signal." },
        { id: "uncer", title: "🔄 Hedging and Uncertainty", desc: "Humans say 'I think', 'maybe', 'I dunno'. AI often answers with more confidence than the question warrants." },
        { id: "self", title: "🪞 Self-Reference", desc: "Does the respondent mention their own physical experience, personal history, or something they witnessed?" },
        { id: "know", title: "📚 Knowledge Precision", desc: "Does the respondent produce an unusually detailed, accurate answer for a casual conversation?" },
        { id: "tonal", title: "🎭 Tonal Consistency", desc: "Does the tone stay unnaturally consistent? Humans shift tone based on how they feel." }
    ];

    const SESSIONS = [
        { q: "What did you do last weekend?", r: "I went hiking with my sister up at Cane Creek — we've been trying to do one new trail a month since she moved back. It was muddy and we got a bit lost, but honestly that ended up being the best part. We found this weird clearing with a fire ring that someone had obviously been using recently. Gave us both the creeps a little.", id: "HUMAN", reason: "Includes sensory detail (muddy), an evolving emotional response (creeps), and a natural trailing thought. The informal fragment 'Gave us both the creeps' is a strong human marker." },
        { q: "What did you do last weekend?", r: "Last weekend I spent time catching up on some reading and relaxing at home. It was a quiet and refreshing break. I also took the opportunity to organize some personal tasks that had been piling up, which felt quite productive. Overall it was a good balance of rest and accomplishment.", id: "AI", reason: "'Catching up on reading', 'refreshing break' — these are placeholder phrases. The response is structurally complete but emotionally empty. It lacks messy human details." },
        { q: "Do you think social media is good or bad for teenagers?", r: "Social media has both benefits and drawbacks for teenagers. On the positive side, it enables social connection, creative expression, and access to information. On the negative side, studies have linked heavy use to anxiety, depression, and cyberbullying. The overall impact depends on how it is used and the individual's circumstances.", id: "AI", reason: "This is a perfectly balanced debate paragraph. Humans usually give biased opinions or personal anecdotes. The 'positive side / negative side' format is a machine signature." },
        { q: "Do you think social media is good or bad for teenagers?", r: "Honestly? Probably bad more than good, at least for the way most people use it. I deleted Instagram off my phone for like three months last year and I genuinely felt less anxious — but I also missed stuff and kind of fell out of the loop with some people. So I put it back but with limits. I dunno. I think it's designed to be addictive and that's the real problem, not the platform itself.", id: "HUMAN", reason: "Contains markers of genuine reflection ('Honestly?', 'I dunno'). The specific personal experiment (deleting Instagram) and its nuanced outcome feel uniquely human." }
    ];

    const SCENES = ["intro", "briefing", "session-0", "session-1", "session-2", "session-3", "interlude", "analysis", "report"];
    
    let currentStep = 0;
    let state = {
        verdicts: [], // {isCorrect, verdict, confidence, indicators}
        ranking: []
    };

    function init() {
        const dots = document.getElementById('dots-container');
        SCENES.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.id = `dot-${i}`;
            dots.appendChild(dot);
        });
        render();
    }

    function render() {
        const stage = document.getElementById('stage');
        stage.innerHTML = '';
        const stepName = SCENES[currentStep];

        const scene = document.createElement('div');
        scene.className = 'scene active';

        if (stepName === "intro") {
            scene.innerHTML = `
                <div class="content-card">
                    <div class="intro-view">
                        <div class="icon-circle">
                            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                        </div>
                        <h2>Project Turing</h2>
                        <p style="margin-bottom: 1.5rem;">Can a machine think? Alan Turing proposed that if a machine can hold a conversation indistinguishable from a human, it has passed the test.</p>
                        <p>You will act as the <strong>Examiner</strong>. Review 4 conversations and determine if the respondent is a human or an AI based on behavioral indicators.</p>
                        <div style="background: var(--primary-light); padding: 1rem; border-radius: 8px; margin-top: 2rem; font-size: 0.9rem;">
                            <strong>Ready?</strong> Click Next to review your Briefing.
                        </div>
                    </div>
                </div>
            `;
        } else if (stepName === "briefing") {
            scene.innerHTML = `
                <div class="content-card">
                    <div class="briefing-layout">
                        <div class="sidebar-nav">
                            <h3>Examiner Briefing</h3>
                            <p class="text-muted" style="font-size: 0.8rem; margin-bottom: 1rem;">Review indicators used to detect AI.</p>
                            ${INDICATORS.map((ind, i) => `<button class="tab-btn ${i===0?'active':''}" onclick="switchTab(this, ${i})">${ind.title}</button>`).join('')}
                        </div>
                        <div id="brief-content" style="padding: 1rem;">
                            <h2 id="brief-title">${INDICATORS[0].title}</h2>
                            <p id="brief-desc" style="margin-top: 1.5rem; line-height: 1.8;">${INDICATORS[0].desc}</p>
                        </div>
                    </div>
                </div>
            `;
        } else if (stepName.startsWith("session")) {
            const sIdx = parseInt(stepName.split("-")[1]);
            const session = SESSIONS[sIdx];
            scene.innerHTML = `
                <div class="content-card">
                    <div class="session-grid">
                        <div class="chat-display">
                            <div class="message msg-examiner"><strong>EXAMINER:</strong><br>${session.q}</div>
                            <div class="message msg-respondent"><strong>RESPONDENT:</strong><br>${session.r}</div>
                        </div>
                        <div class="controls-area">
                            <h3>Verdict</h3>
                            <div class="verdict-options">
                                <button class="control-btn" id="v-human" onclick="setVerdict('HUMAN')">🧑 HUMAN</button>
                                <button class="control-btn" id="v-ai" onclick="setVerdict('AI')">🤖 AI</button>
                                <button class="control-btn" id="v-un" onclick="setVerdict('UNCERTAIN')">❓ UNCERTAIN</button>
                            </div>
                            <h3>Indicators</h3>
                            <div class="indicator-checks">
                                ${INDICATORS.map(ind => `
                                    <label class="check-pill">
                                        <input type="checkbox" class="ind-check" value="${ind.id}"> ${ind.title}
                                    </label>
                                `).join('')}
                            </div>
                            <h3>Confidence</h3>
                            <div class="verdict-options" style="grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
                                <button class="control-btn conf-btn" onclick="setConf('HIGH', this)">HIGH</button>
                                <button class="control-btn conf-btn" onclick="setConf('MED', this)">MED</button>
                                <button class="control-btn conf-btn" onclick="setConf('LOW', this)">LOW</button>
                            </div>
                            <button class="btn btn-primary" id="btn-submit-judgment" onclick="submitJudgment(${sIdx})" disabled>Submit Judgment</button>
                        </div>
                    </div>
                    <div class="reveal-overlay" id="reveal-${sIdx}">
                        <div class="stamp" id="stamp-${sIdx}">IDENTITY CONFIRMED</div>
                        <p id="reveal-reason-${sIdx}" style="max-width: 600px; line-height: 1.6; color: var(--text-muted);"></p>
                        <button class="btn btn-primary" style="margin-top: 2rem;" onclick="changeStep(1)">Next Session &rarr;</button>
                    </div>
                </div>
            `;
        } else if (stepName === "interlude") {
            scene.innerHTML = `
                <div class="content-card">
                    <div class="intro-view">
                        <h2 style="color: var(--primary);">The ELIZA Effect</h2>
                        <p style="text-align: left; margin: 1.5rem 0;">In 1966, a simple program called ELIZA fooled users into thinking it was a therapist just by echoing keywords. People formed deep emotional bonds with it.</p>
                        <p style="text-align: left;">This is the <strong>ELIZA Effect</strong>: our tendency to attribute human thoughts to any system that communicates fluently. Did any of the previous responses pull at your emotions?</p>
                        <div style="background: var(--bg-light); border: 1px solid var(--border); padding: 1.5rem; border-radius: 8px; margin-top: 2rem;">
                            <p style="font-weight: 700; margin-bottom: 1rem;">Reflect: Which was harder to detect?</p>
                            <button class="btn btn-outline" onclick="changeStep(1)">AI sounding like a human</button>
                            <button class="btn btn-outline" onclick="changeStep(1)">Humans sounding like themselves</button>
                        </div>
                    </div>
                </div>
            `;
        } else if (stepName === "analysis") {
            scene.innerHTML = `
                <div class="content-card">
                    <h2 style="text-align: center; margin-bottom: 1rem;">Pattern Analysis</h2>
                    <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Select the 3 most reliable indicators for detecting AI.</p>
                    <div class="rank-container" id="rank-box">
                        ${INDICATORS.map(ind => `<div class="rank-item" onclick="toggleRank('${ind.id}', this)"><span>${ind.title}</span></div>`).join('')}
                    </div>
                    <div id="rank-feedback" style="display:none; margin-top: 2rem; padding: 1rem; background: var(--primary-light); border-radius: 8px;">
                        <strong>Actual Top 3:</strong> 1. Self-Reference, 2. Emotional Authenticity, 3. Hedging.
                    </div>
                </div>
            `;
        } else if (stepName === "report") {
            const score = state.verdicts.filter(v => v.isCorrect).length;
            scene.innerHTML = `
                <div class="content-card" style="overflow-y: auto;">
                    <h2 style="text-align: center; color: var(--primary);">Examiner Final Report</h2>
                    <div style="display:flex; justify-content: center; margin: 1.5rem 0;">
                        <div style="width: 120px; height: 120px; border-radius: 50%; border: 8px solid var(--primary); display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 800;">
                            ${score}/4
                        </div>
                    </div>
                    <table class="results-table">
                        <thead><tr><th>Session</th><th>Target</th><th>Verdict</th><th>Status</th></tr></thead>
                        <tbody>
                            ${state.verdicts.map((v, i) => `
                                <tr>
                                    <td>Session ${i+1}</td>
                                    <td>${SESSIONS[i].id}</td>
                                    <td>${v.verdict}</td>
                                    <td style="color: ${v.isCorrect? 'var(--human-color)':'var(--ai-color)'}">${v.isCorrect?'CORRECT':'FOOLED'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <p style="margin-top: 1rem; color: var(--text-muted); text-align: center;">Rank: ${score > 2 ? 'Expert Examiner' : 'Novice Examiner'}</p>
                </div>
            `;
        }

        stage.appendChild(scene);
        updateUI();
    }

    function switchTab(btn, idx) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('brief-title').innerText = INDICATORS[idx].title;
        document.getElementById('brief-desc').innerText = INDICATORS[idx].desc;
    }

    function setVerdict(v) {
        document.querySelectorAll('.control-btn').forEach(b => b.classList.remove('active', 'human', 'ai', 'uncertain'));
        const btn = document.getElementById(v === 'HUMAN' ? 'v-human' : (v === 'AI' ? 'v-ai' : 'v-un'));
        btn.classList.add('active', v.toLowerCase());
        checkSessionReady();
    }

    function setConf(c, btn) {
        document.querySelectorAll('.conf-btn').forEach(b => b.classList.remove('active', 'human'));
        btn.classList.add('active', 'human');
        checkSessionReady();
    }

    function checkSessionReady() {
        const hasV = document.querySelector('.control-btn.active:not(.conf-btn)');
        const hasC = document.querySelector('.conf-btn.active');
        document.getElementById('btn-submit-judgment').disabled = !(hasV && hasC);
    }

    function submitJudgment(idx) {
        const v = document.querySelector('.control-btn.active:not(.conf-btn)').innerText.split(' ')[1];
        const isCorrect = v === SESSIONS[idx].id;
        state.verdicts[idx] = { verdict: v, isCorrect };

        const overlay = document.getElementById(`reveal-${idx}`);
        const stamp = document.getElementById(`stamp-${idx}`);
        const reason = document.getElementById(`reveal-reason-${idx}`);

        stamp.className = `stamp ${SESSIONS[idx].id.toLowerCase()}`;
        stamp.innerText = `IDENTITY: ${SESSIONS[idx].id}`;
        reason.innerText = SESSIONS[idx].reason;
        overlay.classList.add('active');
    }

    function toggleRank(id, el) {
        if (state.ranking.includes(id)) {
            state.ranking = state.ranking.filter(i => i !== id);
            el.classList.remove('selected');
            const b = el.querySelector('.rank-badge');
            if (b) b.remove();
        } else if (state.ranking.length < 3) {
            state.ranking.push(id);
            el.classList.add('selected');
            const b = document.createElement('span');
            b.className = 'rank-badge';
            b.innerText = `#${state.ranking.length}`;
            el.appendChild(b);
        }
        
        if (state.ranking.length === 3) {
            document.getElementById('rank-feedback').style.display = 'block';
            document.getElementById('btn-next').disabled = false;
        }
    }

    function changeStep(dir) {
        const next = currentStep + dir;
        if (next >= 0 && next < SCENES.length) {
            currentStep = next;
            render();
        }
    }

    function updateUI() {
        document.getElementById('btn-back').disabled = currentStep === 0;
        document.getElementById('btn-next').disabled = (SCENES[currentStep].startsWith('session')) || (SCENES[currentStep] === 'analysis' && state.ranking.length < 3);
        if (currentStep === SCENES.length - 1) document.getElementById('btn-next').style.display = 'none';
        else document.getElementById('btn-next').style.display = 'block';

        document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === currentStep));
    }

    function restart() {
        currentStep = 0;
        state = { verdicts: [], ranking: [] };
        render();
    }

    window.onload = init;
</script>
</body>
</html>
