        [result[i], result[j]] = [result[j], result[i]];

            </div>

            <!-- Diagnostics log item list -->
            <div class="space-y-4">
              <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest font-mono">✦ Forensic Diagnosis Logs</h3>
              
              <div class="space-y-4">
                ${state.shuffledAutopsyCards.map((card, idx) => {
                  const isSelected = state.autopsySelections.includes(idx);
                  const isCorrect = (card.type === 'VIOLATION' && isSelected) || (card.type === 'DISTRACTOR' && !isSelected);
                  
                  return `
                    <div class="p-6 border rounded-2xl flex flex-col md:flex-row items-start justify-between gap-6 transition-all duration-150 ${
                      isCorrect 
                        ? 'border-emerald-100 bg-emerald-50/20' 
                        : 'border-rose-100 bg-rose-50/20'
                    }">
                      <div class="space-y-3.5 max-w-3xl">
                        <!-- Flag indicator badge -->
                        <div class="flex flex-wrap gap-2 items-center">
                          <span class="flex items-center gap-1.5 text-[9px] uppercase font-bold px-2.5 py-1 rounded-full font-mono ${
                            isCorrect 
                              ? 'bg-emerald-100 text-emerald-800 border border-emerald-250' 
                              : 'bg-rose-100 text-rose-800 border border-rose-250'
                          }">
                            <i data-lucide="${isCorrect ? 'check-circle' : 'x-circle'}" class="w-3.5 h-3.5"></i>
                            ${isCorrect ? 'Accurate Diagnostic' : 'Diagnostic Error'}
                          </span>

                          <span class="inline-block text-[9px] uppercase tracking-wider bg-slate-100 border border-slate-200 px-2.5 py-1 rounded-full text-slate-600 font-mono font-bold">
                            ACTUAL: ${card.type}
                          </span>

                          ${card.tenet ? `
                            <span class="inline-block text-[9px] uppercase tracking-wider bg-indigo-55 text-indigo-750 border border-indigo-150 px-2.5 py-1 rounded-full text-indigo-700 font-mono font-bold">
                              CODE: ${card.tenet}
                            </span>
                          ` : ''}
                        </div>

                        <p class="text-xs text-slate-800 font-bold leading-relaxed">
                          ${card.text}
                        </p>

                        <p class="text-[11px] text-slate-500 font-medium font-mono leading-normal pl-3 border-l-2 border-slate-300">
                          <span class="text-slate-700 font-bold uppercase block text-[9px] tracking-wide mb-1 font-sans">Verification Rationale:</span>
                          ${card.reason}
                        </p>
                      </div>

                      <div class="flex items-center gap-2 font-bold select-none shrink-0 self-start md:self-center">
                        <span class="text-xs font-mono uppercase text-slate-400">Earned:</span>
                        <span class="text-base font-mono font-bold ${isCorrect ? 'text-emerald-600' : 'text-slate-400'}">
                          ${isCorrect ? '+15' : '0'} <span class="text-[10px] text-slate-400 uppercase font-medium">pts</span>
                        </span>
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            </div>

            <!-- Proceed remediation -->
            <div class="pt-6 border-t border-slate-100 flex justify-between items-center flex-wrap gap-4">
              <p class="text-[11px] text-slate-500 max-w-md font-mono">
                Now that you have isolated the ethical threats from normal custom inputs, you must re-engineer the system to fix the vulnerabilities.
              </p>
              
              <button
                type="button"
                onclick="beginFixModule()"
                class="flex items-center gap-2 px-8 py-4 bg-amber-500 hover:bg-amber-600 text-[#2c1d0f] font-bold rounded-2xl uppercase tracking-wider text-xs transition duration-150 btn-active shadow-sm shadow-amber-200"
              >
                Deconstruct & Fix Codebase Violations
                <i data-lucide="arrow-right" class="w-4 h-4 stroke-[3px]"></i>
              </button>
            </div>
          </div>
        `;
      }

      // Screen 5: Fix Remediations
      else if (state.screen === 'fixes') {
        const study = CASE_STUDIES[state.selectedCaseIdx];
        const activeFix = study.fixes[state.currentFixIdx];
        const originalViolation = study.autopsy[activeFix.violationIdx];
        const hasSelected = state.fixSelections[state.currentFixIdx] !== undefined;
        const selectedChoiceIdx = state.fixSelections[state.currentFixIdx];
        
        let submittable = hasSelected;

        html = `
          <div class="space-y-8 fade-in">
            <div class="space-y-1">
              <div class="flex items-center justify-between flex-wrap gap-2 text-slate-500 text-xs font-mono">
                <span>REMEDIATION QUEUE: STEP ${state.currentFixIdx + 1} OF ${study.fixes.length}</span>
                <span class="bg-slate-100 border border-slate-200 text-[10px] text-slate-700 px-2.5 py-1 rounded-full font-bold uppercase tracking-wider">
                  ${study.badge}
                </span>
              </div>
              <h2 class="text-2xl font-bold text-slate-900 font-display uppercase tracking-tight">re-engineer ethical breaches</h2>
            </div>

            <!-- Focus Breach Module Panel -->
            <div class="p-6 bg-amber-50/40 border border-amber-100 rounded-2xl space-y-4">
              <div class="flex items-center gap-2">
                <span class="flex items-center gap-1 text-[8px] bg-amber-100 text-amber-800 border border-amber-250 px-2.5 py-1 rounded-full font-mono font-black uppercase tracking-widest">
                  <i data-lucide="alert-triangle" class="w-3 h-3"></i> Identified Vulnerability
                </span>
                <span class="text-[9px] tracking-wider text-indigo-700 font-mono font-bold">Standard Reference: ${originalViolation.tenet}</span>
              </div>
              
              <p class="text-sm text-slate-800 leading-relaxed font-bold">
                "${originalViolation.text}"
              </p>
            </div>

            <!-- Fix Options Selector Grid -->
            <div class="space-y-4">
              <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest font-mono">✦ Select Resolution Architecture</h3>
              
              <div class="grid grid-cols-1 gap-4">
                ${activeFix.options.map((option, choiceIdx) => {
                  const isChoiceSelected = selectedChoiceIdx === choiceIdx;
                  return `
                    <button
                      type="button"
                      onclick="selectFixOption(${choiceIdx}, ${option.pts})"
                      class="relative text-left p-6 border rounded-2xl transition-all duration-155 cursor-pointer flex flex-col justify-between h-full group ${
                        isChoiceSelected
                          ? 'border-indigo-500 bg-indigo-50/10 shadow hover:shadow-md ring-1 ring-indigo-500/10'
                          : 'border-slate-200 bg-white hover:border-slate-300 hover:shadow shadow-slate-100/30'
                      }"
                    >
                      <div class="space-y-3">
                        <div class="flex items-start gap-4">
                          <div
                            class="w-5 h-5 rounded-full flex items-center justify-center border-2 transition-colors mt-1 shrink-0 ${
                              isChoiceSelected
                                ? 'border-indigo-600 bg-indigo-600 text-white'
                                : 'border-slate-300 bg-white group-hover:border-slate-400'
                            }"
                          >
                            ${isChoiceSelected ? '<i data-lucide="check" class="w-3.5 h-3.5 stroke-[4px]"></i>' : ''}
                          </div>

                          <div class="space-y-1">
                            <p class="text-sm text-slate-800 leading-relaxed font-bold">
                              ${option.text}
                            </p>
                          </div>
                        </div>
                      </div>

                      ${isChoiceSelected ? `
                        <div class="mt-4 pt-4 border-t border-indigo-100 space-y-3.5 fade-in">
                          <div class="flex items-center justify-between flex-wrap gap-2">
                            <span class="flex items-center gap-1.5 text-[9px] uppercase tracking-wider font-bold ${
                              option.type === 'BEST' 
                                ? 'text-emerald-700 font-black' 
                                : option.type === 'PARTIAL' 
                                  ? 'text-amber-700 font-bold' 
                                  : 'text-rose-700 font-bold'
                            }">
                              <i data-lucide="${
                                option.type === 'BEST' 
                                  ? 'shield-check' 
                                  : option.type === 'PARTIAL' 
                                    ? 'alert-circle' 
                                    : 'x-circle'
                              }" class="w-4 h-4"></i>
                              RESOLUTION TYPE: ${option.type}
                            </span>
                            <span class="text-xs font-mono font-bold ${
                              option.pts > 0 ? 'text-emerald-600' : 'text-slate-400'
                            }">
                              +${option.pts} pts awarded
                            </span>
                          </div>

                          <p class="text-[11px] text-slate-500 font-mono leading-normal pl-3 border-l-2 border-indigo-200">
                            <span class="text-slate-700 font-bold uppercase block text-[8px] tracking-wide mb-1 font-sans">Engineering Rationale:</span>
                            ${option.reason}
                          </p>
                        </div>
                      ` : ''}
                    </button>
                  `;
                }).join('')}
              </div>
            </div>

            <!-- Control actions footer -->
            <div class="pt-5 border-t border-slate-150 flex justify-end">
              <button
                type="button"
                onclick="nextFixStep()"
                ${!submittable ? 'disabled' : ''}
                class="w-full sm:w-auto px-8 py-4 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-2xl uppercase tracking-wider text-xs shadow transition-all duration-150 btn-active disabled:bg-slate-100 disabled:text-slate-450 disabled:cursor-not-allowed"
              >
                ${state.currentFixIdx < study.fixes.length - 1 ? 'Confirm & Next Breach' : 'Generate Inspection Certificate'}
              </button>
            </div>
          </div>
        `;
      }

      // Screen 6: Final Autopsy Certification
      else if (state.screen === 'final_report') {
        const study = CASE_STUDIES[state.selectedCaseIdx];
        
        // Define Rank threshold and details
        let rankName = 'Junior Compliance Trainee';
        let rankColor = 'text-amber-700 border-amber-200 bg-amber-50/40';
        let rankDesc = 'Requires deeper grounding in the ethical responsibilities of codebase deployment patterns. Review standards and retry.';

        if (state.runningScore >= 160) {
          rankName = 'Elite Algorithmic Ethicist (S-Rank)';
          rankColor = 'text-emerald-700 border-emerald-250 bg-emerald-50/30';
          rankDesc = 'Outstanding. You have demonstrated mastery of public-interest technology and completed pristine remediation of algorithmic breaches.';
        } else if (state.runningScore >= 130) {
          rankName = 'Senior Forensics Investigator (A-Rank)';
          rankColor = 'text-indigo-700 border-indigo-200 bg-indigo-50/30';
          rankDesc = 'Excellent precision. Successfully audited and resolved high-priority concerns to guard user self-care and resource standards.';
        } else if (state.runningScore >= 105) {
          rankName = 'Certified Ethics Auditor (B-Rank)';
          rankColor = 'text-sky-700 border-sky-250 bg-sky-50/30';
          rankDesc = 'Meets standard professional testing competencies. Some remediating choices left slight technical risk exposure.';
        }

        html = `
          <!-- Printable Forensic Container Block -->
          <div class="space-y-8 fade-in">
            
            <div class="bg-white border-8 border-double border-slate-200 rounded-3xl p-6 md:p-12 space-y-8 relative overflow-hidden print:bg-white print:text-black print:shadow-none print:border-black shadow-lg" id="printable-certificate">
              <!-- Retro Watermark Logo -->
              <div class="absolute inset-0 opacity-[0.02] pointer-events-none flex items-center justify-center select-none">
                <span class="text-7xl md:text-8xl font-black transform scale-[2] rotate-[22deg]">SECURE BY DESIGN</span>
              </div>

              <!-- Certificate Header -->
              <div class="text-center space-y-2 relative z-10">
                <div class="inline-flex items-center justify-center p-4 bg-indigo-50 text-indigo-700 border border-indigo-100 rounded-full mb-2 print:border-black print:text-black">
                  <i data-lucide="shield-check" class="w-10 h-10 stroke-[2]"></i>
                </div>
                <h2 class="text-2xl md:text-3.5xl font-extrabold tracking-tight uppercase font-display text-slate-900 print:text-black leading-tight">
                  Algorithmic Integrity Certification
                </h2>
                <div class="h-1.5 w-32 bg-indigo-600 mx-auto rounded-full print:bg-black"></div>
                <p class="text-[10px] uppercase font-mono tracking-widest text-slate-500 print:text-black font-bold mt-2">
                  Pre-Launch Codebase Forensic Compliance Registry
                </p>
              </div>

              <!-- Attestation Text with Dynamic Subject name -->
              <div class="max-w-xl mx-auto text-center space-y-4 relative z-10 text-slate-700 print:text-black font-semibold leading-relaxed">
                <p class="text-sm">
                  This document officially attests that the application system code known as 
                  <strong class="text-indigo-700 bg-indigo-50 px-3 py-1 rounded text-base border border-indigo-150 print:text-black print:bg-white font-display uppercase font-bold inline-block mx-1">
                    ${study.name}
                  </strong> 
                  has undergone a comprehensive forensic diagnosis and remediation loop backplane.
                </p>
                <p class="text-xs text-slate-500 print:text-black text-center max-w-sm mx-auto font-mono">
                  Audit evaluated under strict conformance metrics corresponding to the standards of 
                  <strong>${study.badge}</strong>.
                </p>
              </div>

              <!-- Certificate Specs Box -->
              <div class="max-w-2xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6 relative z-10 py-2">
                <!-- Score results specs -->
                <div class="p-6 bg-slate-50 border border-slate-150 rounded-2xl flex items-center justify-between print:bg-white print:border-black">
                  <div class="space-y-1">
                    <span class="block text-[8px] text-slate-400 uppercase tracking-wider font-mono">Fidelity Audit Score</span>
                    <span class="text-2.5xl font-black font-mono text-emerald-600 print:text-black leading-tight">
                      ${state.runningScore} <span class="text-xs text-slate-450 font-normal uppercase">pts</span>
                    </span>
                  </div>
                  <i data-lucide="award" class="w-8 h-8 text-emerald-600 print:text-black"></i>
                </div>

                <!-- Forensic Rank Award -->
                <div class="p-6 bg-slate-50 border border-slate-150 rounded-2xl flex items-center justify-between print:bg-white print:border-black">
                  <div class="space-y-1">
                    <span class="block text-[8px] text-slate-400 uppercase tracking-wider font-mono">Compliance Rank</span>
                    <span class="text-sm font-bold font-display text-slate-850 print:text-black leading-tight uppercase block">
                      ${rankName.split('(')[0]}
                    </span>
                    <span class="text-[10px] font-bold font-mono text-indigo-700 print:text-black inline-block">
                      ${rankName.includes('(') ? '(' + rankName.split('(')[1] : ''}
                    </span>
                  </div>
                  <i data-lucide="shield" class="w-8 h-8 text-indigo-600 print:text-black"></i>
                </div>
              </div>

              <!-- Attestation details block -->
              <div class="max-w-2xl mx-auto p-5 rounded-2xl border ${rankColor} text-center space-y-1 relative z-10">
                <p class="text-xs leading-relaxed font-semibold">
                  ${rankDesc}
                </p>
              </div>

              <!-- Signature lines grid (Printable beauty) -->
              <div class="border-t border-slate-100 pt-8 mt-4 grid grid-cols-1 sm:grid-cols-2 gap-8 max-w-xl mx-auto relative z-10 text-center font-mono text-[10px] text-slate-400 print:border-black print:text-black font-bold">
                <div class="space-y-3">
                  <div class="h-6 flex items-end justify-center">
                    <span class="font-display italic text-slate-600 text-xs tracking-wider select-none font-semibold print:text-black">
                      Forensic Lab Operator
                    </span>
                  </div>
                  <div class="border-t border-slate-200 mx-6 print:border-black"></div>
                  <p class="uppercase tracking-wider">AUTHORIZED AUDITOR SIGNATURE</p>
                </div>

                <div class="space-y-3">
                  <div class="h-6 flex items-end justify-center font-black text-emerald-600 tracking-wide font-extrabold print:text-black">
                    COMPLIANT SECURE DESIGN
                  </div>
                  <div class="border-t border-slate-200 mx-6 print:border-black"></div>
                  <p class="uppercase tracking-wider">VERIFICATION CERTIFICATION SEAL</p>
                </div>
              </div>

            </div>

            <!-- Action panel with Print & Restart, completely hidden from media printing -->
            <div class="pt-6 border-t border-slate-100 flex flex-col sm:flex-row items-center justify-between gap-4 print:hidden">
              <p class="text-xs text-slate-450 font-mono">
                Audit complete. Keep this record of your ethical investigation, or audit another production system.
              </p>

              <div class="flex flex-wrap gap-3 w-full sm:w-auto">
                <button
                  type="button"
                  onclick="window.print()"
                  class="flex items-center justify-center gap-2 px-6 py-4 bg-slate-100 hover:bg-slate-200 text-slate-700 hover:text-slate-800 font-bold rounded-2xl uppercase tracking-wider text-xs transition duration-150 btn-active w-full sm:w-auto cursor-pointer border border-slate-200 shadow-sm"
                >
                  <i data-lucide="printer" class="w-4 h-4"></i>
                  Print Compliance Certificate
                </button>

                <button
                  type="button"
                  onclick="restartAudit()"
                  class="flex items-center justify-center gap-2 px-8 py-4 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-2xl uppercase tracking-wider text-xs shadow transition-all duration-150 btn-active w-full sm:w-auto cursor-pointer"
                >
                  <i data-lucide="refresh-cw" class="w-4 h-4 text-white stroke-[3px]"></i>
                  Audit Another System
                </button>
              </div>
            </div>

          </div>
        `;
      }

      // Render actual html content
      container.innerHTML = html;

      // Swap plain Lucide tags with clean responsive icons
      lucide.createIcons();
    }

    // === START APPS ===
    document.addEventListener('DOMContentLoaded', () => {
      renderApp();
    });
  </script>
</body>
</html>
